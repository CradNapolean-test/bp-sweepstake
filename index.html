<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ballistic Performance World Cup Sweepstake</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --teal: #2ec4b6;
  --teal-light: #4dd9cc;
  --teal-dim: rgba(46,196,182,0.15);
  --teal-border: rgba(46,196,182,0.3);
  --dark: #0d0d0d;
  --dark-mid: #1a1a1a;
  --mid: #252525;
  --border: rgba(255,255,255,0.08);
  --border-mid: rgba(255,255,255,0.14);
  --text: #f2f2f2;
  --text-muted: #888888;
  --red: #e84040;
  --radius: 10px;
  --radius-lg: 16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--text);min-height:100vh}
.header{background:var(--dark-mid);border-bottom:1px solid var(--border-mid);padding:1rem 1.5rem;display:flex;align-items:center;gap:12px}
.header-logo{width:44px;height:44px;border-radius:50%;object-fit:cover;flex-shrink:0}
.header-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:var(--teal)}
.header-sub{font-size:12px;color:var(--text-muted)}
.mode-badge{margin-left:auto;font-size:11px;padding:4px 10px;border-radius:20px;font-weight:600;letter-spacing:.05em;background:rgba(46,196,182,0.15);color:var(--teal);border:1px solid rgba(46,196,182,0.3)}
.page{max-width:900px;margin:0 auto;padding:1.5rem}
.tabs{display:flex;gap:6px;margin-bottom:1.5rem;background:var(--dark-mid);padding:5px;border-radius:var(--radius);border:1px solid var(--border);width:fit-content}
.tab{padding:7px 18px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;background:transparent;color:var(--text-muted);border:none;transition:all .2s;font-family:'DM Sans',sans-serif}
.tab:hover{color:var(--text)}
.tab.on{background:var(--teal);color:#0d0d0d;font-weight:700}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
.stat{background:var(--dark-mid);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;text-align:center}
.stat-n{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--teal);letter-spacing:1px}
.stat-l{font-size:11px;color:var(--text-muted);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.card{background:var(--dark-mid);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1rem}
.sec{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.row{display:flex;gap:8px;align-items:flex-end}
.row>div{flex:1}
label{font-size:12px;color:var(--text-muted);display:block;margin-bottom:5px}
input[type=text],input[type=email],input[type=password]{width:100%;padding:9px 12px;font-size:14px;font-family:'DM Sans',sans-serif;background:var(--dark);border:1px solid rgba(255,255,255,0.12);border-radius:var(--radius);color:var(--text);outline:none;transition:border-color .2s}
input:focus{border-color:var(--teal)}
input::placeholder{color:var(--text-muted)}
.btn{padding:9px 18px;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;font-family:'DM Sans',sans-serif}
.btn:active{transform:scale(.97)}
.btn-teal{background:var(--teal);color:#0d0d0d;font-weight:700}
.btn-teal:hover{background:var(--teal-light)}
.btn-danger{background:rgba(232,64,64,0.15);color:var(--red);border:1px solid rgba(232,64,64,0.3)}
.btn-danger:hover{background:rgba(232,64,64,0.25)}
.prow{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--dark);border:1px solid var(--border);border-radius:var(--radius);font-size:13px;margin-bottom:6px;flex-wrap:wrap}
.pname{font-weight:600;color:var(--text);min-width:100px}
.pemail{color:var(--text-muted);font-size:12px;min-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pteams{flex:1;font-size:12px;color:var(--text-muted)}
.badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.b-pending{background:rgba(255,255,255,0.07);color:var(--text-muted)}
.b-half{background:rgba(46,196,182,0.12);color:var(--teal)}
.b-done{background:rgba(46,196,182,0.2);color:var(--teal-light)}
.link-btn{font-size:12px;color:var(--teal);cursor:pointer;text-decoration:none;white-space:nowrap;padding:4px 8px;border-radius:6px;background:rgba(46,196,182,0.1);border:1px solid rgba(46,196,182,0.25)}
.link-btn:hover{background:rgba(46,196,182,0.2)}
.empty{text-align:center;padding:2.5rem;color:var(--text-muted);font-size:14px}
.pool-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.pool-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--teal)}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:6px;margin-bottom:1.5rem}
.tchip{font-size:12px;padding:7px 10px;background:var(--dark);border:1px solid var(--border);border-radius:var(--radius);display:flex;align-items:center;gap:8px}
.tchip.taken{opacity:.3;text-decoration:line-through}
.chip-flag{width:28px;height:20px;object-fit:cover;border-radius:2px;flex-shrink:0}
.chip-info{flex:1}
.chip-name{color:var(--text);font-weight:500}
.chip-seed{font-size:10px;color:var(--text-muted)}
.reveal-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;min-height:calc(100vh - 64px)}
.step-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);margin-bottom:.5rem}
.reveal-title{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:2px;color:var(--teal);margin-bottom:.5rem}
.reveal-sub{font-size:14px;color:var(--text-muted);margin-bottom:2rem;max-width:340px}
.big-btn{padding:14px 36px;font-size:16px;font-weight:700;border-radius:var(--radius-lg);cursor:pointer;border:none;background:var(--teal);color:#0d0d0d;font-family:'DM Sans',sans-serif;letter-spacing:.02em;transition:all .2s}
.big-btn:hover{background:var(--teal-light);transform:translateY(-1px)}
.big-btn:active{transform:scale(.97)}
.spin-ball{font-size:80px;animation:spinY .8s linear infinite;display:inline-block;margin-bottom:1rem}
@keyframes spinY{from{transform:rotateY(0)}to{transform:rotateY(360deg)}}
.big-flag-img{width:120px;height:90px;object-fit:cover;border-radius:6px;margin-bottom:1rem;animation:popIn .5s cubic-bezier(.34,1.56,.64,1);box-shadow:0 0 0 1px rgba(255,255,255,0.1)}
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.team-name{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:3px;color:var(--text);animation:popIn .5s cubic-bezier(.34,1.56,.64,1) .1s both}
.team-meta{font-size:13px;color:var(--text-muted);margin-top:6px;animation:popIn .4s ease .2s both;line-height:1.8}
.team-meta span{display:inline-block;padding:2px 10px;border-radius:20px;margin:2px;background:rgba(46,196,182,0.12);color:var(--teal);border:1px solid rgba(46,196,182,0.25)}
.pair-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:1.5rem;width:100%;max-width:480px}
.pcard{background:var(--dark-mid);border:1px solid rgba(46,196,182,0.3);border-radius:var(--radius-lg);padding:1.25rem;text-align:center}
.pcard-flag{width:80px;height:60px;object-fit:cover;border-radius:4px;margin-bottom:.75rem;box-shadow:0 0 0 1px rgba(255,255,255,0.08)}
.pcard-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1.5px;color:var(--text)}
.pcard-meta{font-size:11px;color:var(--text-muted);margin-top:4px;line-height:1.7}
.good-luck{font-size:14px;color:var(--text-muted);margin-top:1.5rem;animation:popIn .4s ease .5s both}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--mid);border:1px solid var(--border-mid);border-radius:var(--radius);padding:10px 20px;font-size:13px;color:var(--text);opacity:0;transition:opacity .25s;pointer-events:none;z-index:9999;white-space:nowrap}
.toast.show{opacity:1}
.lock-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.lock-card{background:var(--dark-mid);border:1px solid var(--border-mid);border-radius:var(--radius-lg);padding:2.5rem;width:100%;max-width:380px;text-align:center}
.lock-logo{width:110px;height:110px;border-radius:50%;object-fit:cover;margin-bottom:1.5rem}
.lock-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--teal);margin-bottom:.4rem}
.lock-sub{font-size:13px;color:var(--text-muted);margin-bottom:1.5rem}
.lock-error{font-size:12px;color:var(--red);margin-top:8px;min-height:16px}
.gs-setup{background:rgba(46,196,182,0.06);border:1px solid rgba(46,196,182,0.2);border-radius:var(--radius);padding:1rem;margin-bottom:1rem;font-size:13px;color:var(--text-muted);line-height:1.6}
.gs-setup a{color:var(--teal)}
.gs-input-row{display:flex;gap:8px;margin-bottom:8px}
@media(max-width:600px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .row{flex-direction:column}
  .pair-grid{grid-template-columns:1fr 1fr;gap:10px}
  .team-name{font-size:36px}
}
</style>
</head>

function uid() { return Math.random().toString(36).substr(2,9); }

function getParams() {
  const p = new URLSearchParams(window.location.search);
  return { draw: p.get('draw'), admin: p.get('admin') };
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

function copyLink(token) {
  const url = window.location.origin + window.location.pathname + '?draw=' + token;
  navigator.clipboard.writeText(url).then(() => showToast('Link copied to clipboard'));
}

async function gasRequest(action, data={}) {
  if (!GAS_URL) return null;
  try {
    const params = new URLSearchParams({ action, payload: JSON.stringify(data) });
    const res = await fetch(GAS_URL + '?' + params.toString(), {
      method: 'GET',
      redirect: 'follow'
    });
    const text = await res.text();
    return JSON.parse(text);
  } catch(e) {
    console.error('GAS error:', e);
    return null;
  }
}

async function loadFromSheet() {
  const res = await gasRequest('getAll');
  if (!res || !res.participants) return false;
  state.participants = res.participants;
  state.usedP1 = res.usedP1 || [];
  state.usedP2 = res.usedP2 || [];
  return true;
}

async function addParticipant() {
  const name = document.getElementById('nn').value.trim();
  const email = document.getElementById('ne').value.trim();
  if (!name) { document.getElementById('nn').focus(); return; }
  const p = { id: uid(), name, email, p1: null, p2: null, token: uid() };
  document.getElementById('add-btn').textContent = 'Saving...';
  document.getElementById('add-btn').disabled = true;
  const res = await gasRequest('addParticipant', { participant: p });
  if (res && res.success) {
    state.participants.push(p);
    document.getElementById('nn').value = '';
    document.getElementById('ne').value = '';
    renderAdmin();
    showToast(name + ' added');
  } else {
    showToast('Error saving — check your sheet URL');
  }
  document.getElementById('add-btn').textContent = 'Add';
  document.getElementById('add-btn').disabled = false;
}

async function removeParticipant(id) {
  const p = state.participants.find(x => x.id === id);
  if (!p) return;
  const res = await gasRequest('removeParticipant', { id });
  if (res && res.success) {
    if (p.p1 !== null) state.usedP1 = state.usedP1.filter(i => i !== p.p1);
    if (p.p2 !== null) state.usedP2 = state.usedP2.filter(i => i !== p.p2);
    state.participants = state.participants.filter(x => x.id !== id);
    renderAdmin();
    showToast('Removed ' + p.name);
  } else {
    showToast('Error removing');
  }
}

function showTab(tab) {
  ['admin','teams'].forEach(t => {
    document.getElementById('t-'+t).style.display = t === tab ? '' : 'none';
  });
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('on', ['admin','teams'][i] === tab);
  });
  if (tab === 'teams') renderTeams();
}

function renderStats() {
  const done = state.participants.filter(p => p.p1 !== null && p.p2 !== null).length;
  document.getElementById('s-total').textContent = state.participants.length;
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-p1').textContent = 24 - state.usedP1.length;
  document.getElementById('s-p2').textContent = 24 - state.usedP2.length;
}

function renderParticipants() {
  const el = document.getElementById('plist');
  if (!state.participants.length) {
    el.innerHTML = '<div class="empty">No participants yet — add someone above.</div>';
    return;
  }
  el.innerHTML = state.participants.map(p => {
    let badge, badgeClass;
    if (p.p1 !== null && p.p2 !== null) { badge = 'Both drawn'; badgeClass = 'b-done'; }
    else if (p.p1 !== null || p.p2 !== null) { badge = '1 of 2'; badgeClass = 'b-half'; }
    else { badge = 'Pending'; badgeClass = 'b-pending'; }
    const t1 = p.p1 !== null ? P1[p.p1].name : 'Pool 1 pending';
    const t2 = p.p2 !== null ? P2[p.p2].name : 'Pool 2 pending';
    return `<div class="prow">
      <span class="pname">${p.name}</span>
      <span class="pemail">${p.email || '—'}</span>
      <span class="pteams">${t1} · ${t2}</span>
      <span class="badge ${badgeClass}">${badge}</span>
      <span class="link-btn" onclick="copyLink('${p.token}')">📋 Copy link</span>
      <button class="btn btn-danger" style="padding:5px 10px;font-size:11px" onclick="removeParticipant('${p.id}')">Remove</button>
    </div>`;
  }).join('');
}

function renderAdmin() {

}

            <input type="text" id="gas-url-input" placeholder="Paste your Google Apps Script URL here" value="${GAS_URL}" style="flex:1"/>
            <button class="btn btn-teal" onclick="saveGasUrl()">Save URL</button>
            <button class="btn" style="background:var(--mid);color:var(--text)" onclick="refreshData()">Refresh</button>
          </div>
        </div>
        <div class="stats">
          <div class="stat"><div class="stat-n" id="s-total">0</div><div class="stat-l">Participants</div></div>
          <div class="stat"><div class="stat-n" id="s-done">0</div><div class="stat-l">Fully drawn</div></div>
          <div class="stat"><div class="stat-n" id="s-p1">24</div><div class="stat-l">Pool 1 left</div></div>
          <div class="stat"><div class="stat-n" id="s-p2">24</div><div class="stat-l">Pool 2 left</div></div>
        </div>
        <div class="card">
          <div class="sec">Add participant</div>
          <div class="row">
            <div><label>Name</label><input type="text" id="nn" placeholder="e.g. Jamie Smith" onkeydown="if(event.key==='Enter')addParticipant()"/></div>
            <div><label>Email (optional)</label><input type="email" id="ne" placeholder="jamie@email.com" onkeydown="if(event.key==='Enter')addParticipant()"/></div>
            <button class="btn btn-teal" id="add-btn" onclick="addParticipant()">Add</button>
          </div>
        </div>
        <div class="card">
          <div class="sec">Participants & draw links</div>
          <div id="plist"><div class="empty">Loading...</div></div>
        </div>
      </div>
      <div id="t-teams" style="display:none"><div class="card" id="tgrid"></div></div>
    </div>`;
  loadFromSheet().then(() => renderAdmin());
}

async function saveGasUrl() {
  const val = document.getElementById('gas-url-input').value.trim();
  GAS_URL = val;
  localStorage.setItem('bp_gas_url', val);
  showToast('URL saved — refreshing data...');
  await loadFromSheet();
  renderAdmin();
}

async function refreshData() {
  showToast('Refreshing...');
  await loadFromSheet();
  renderAdmin();
  showToast('Data refreshed');
}

function renderLockScreen() {
  document.getElementById('app').innerHTML = `
    <div class="lock-screen">
      <div class="lock-card">
        <img class="lock-logo" src="${LOGO}" alt="Ballistic Performance"/>
        <div class="lock-title">Admin Access</div>
        <div class="lock-sub">Enter the admin password to manage the sweepstake</div>
        <label>Password</label>
        <input type="password" id="pw" placeholder="Enter password" onkeydown="if(event.key==='Enter')checkPass()" style="margin-bottom:4px"/>
        <div class="lock-error" id="pw-err"></div>
        <button class="btn btn-teal" style="width:100%;margin-top:12px" onclick="checkPass()">Unlock</button>
      </div>
    </div>`;
  setTimeout(() => document.getElementById('pw') && document.getElementById('pw').focus(), 50);
}

function checkPass() {
  const val = document.getElementById('pw').value;
  if (val === ADMIN_PASS) { state.adminUnlocked = true; renderAdminPanel(); }
  else {
    document.getElementById('pw-err').textContent = 'Incorrect password. Please try again.';
    document.getElementById('pw').value = '';
    document.getElementById('pw').focus();
  }
}

async function renderMemberDraw(token) {
  document.getElementById('app').innerHTML = `
    <div class="header">
      <img class="header-logo" src="${LOGO}" alt="Ballistic Performance"/>
      <div><div class="header-title">Ballistic Performance World Cup Sweepstake</div><div class="header-sub">2026 FIFA World Cup</div></div>
      <span class="mode-badge">Your Draw</span>
    </div>
    <div class="reveal-body"><div class="spin-ball">⚽</div><p style="font-size:14px;color:var(--text-muted)">Loading your draw...</p></div>`;

  const res = await gasRequest('getByToken', { token });
  if (!res || !res.participant) {
    document.querySelector('.reveal-body').innerHTML = `
      <img src="${LOGO}" style="width:90px;height:90px;border-radius:50%;object-fit:cover;margin-bottom:1.5rem"/>
      <p style="font-size:18px;color:var(--text-muted)">Draw link not recognised.</p>
      <p style="font-size:14px;color:var(--text-muted);margin-top:8px">Please contact the gym to get a valid link.</p>`;
    return;
  }

  const participant = res.participant;
  if (participant.p1 !== null && participant.p2 !== null) {
    showBothTeams(participant);
    return;
  }
  showRevealStart(participant);
}

function showRevealStart(participant) {
  document.querySelector('.reveal-body').innerHTML = `
    <img src="${LOGO}" style="width:100px;height:100px;border-radius:50%;object-fit:cover;margin-bottom:1.5rem;animation:popIn .4s ease both"/>
    <div class="step-label">Welcome, ${participant.name}</div>
    <div class="reveal-title">Ready for your teams?</div>
    <p class="reveal-sub">You'll get two reveals — your top seeded team first, then your underdog.</p>
    <button class="big-btn" onclick="startRevealP1('${participant.token}')">Reveal Pool 1 team ⚽</button>`;
}

async function startRevealP1(token) {
  document.querySelector('.reveal-body').innerHTML = `
    <div class="step-label">Pool 1 — Top seeded team</div>
    <div class="spin-ball">⚽</div>
    <p style="font-size:14px;color:var(--text-muted)">Drawing your top seeded team...</p>`;

  setTimeout(async () => {
    const res = await gasRequest('assignTeams', { token });
    if (!res || !res.success) {
      document.querySelector('.reveal-body').innerHTML = `<p style="color:var(--red)">Something went wrong. Please try again.</p>`;
      return;
    }
    const participant = res.participant;
    const team = P1[participant.p1];
    document.querySelector('.reveal-body').innerHTML = `
      <div class="step-label">Pool 1 — Your top seeded team</div>
      <img class="big-flag-img" src="${flagUrl(team.fc)}" alt="${team.name}"/>
      <div class="team-name">${team.name}</div>
      <div class="team-meta">
        <span>Seed ${team.s}</span>
        <span>FIFA Rank ${team.r}</span>
        <span>Pool 1</span>
      </div>
      <button class="big-btn" style="margin-top:2rem" onclick='revealP2(${JSON.stringify(participant)})'>Now reveal your underdog ⚽</button>`;
  }, 1400);
}

function revealP2(participant) {
  document.querySelector('.reveal-body').innerHTML = `
    <div class="step-label">Pool 2 — Underdog team</div>
    <div class="spin-ball">⚽</div>
    <p style="font-size:14px;color:var(--text-muted)">Drawing your underdog team...</p>`;
  setTimeout(() => showBothTeams(participant), 1400);
}

function showBothTeams(participant) {
  const t1 = P1[participant.p1];
  const t2 = P2[participant.p2];
  document.getElementById('app').innerHTML = `
    <div class="header">
      <img class="header-logo" src="${LOGO}" alt="Ballistic Performance"/>
      <div><div class="header-title">Ballistic Performance World Cup Sweepstake</div><div class="header-sub">2026 FIFA World Cup</div></div>
      <span class="mode-badge">Your Teams</span>
    </div>
    <div class="reveal-body">
      <img src="${LOGO}" style="width:80px;height:80px;border-radius:50%;object-fit:cover;margin-bottom:1rem;animation:popIn .4s ease both"/>
      <div class="step-label" style="animation:popIn .4s ease both">Your 2026 World Cup teams</div>
      <div class="reveal-title" style="animation:popIn .4s ease .1s both">${participant.name}</div>
      <div class="pair-grid" style="animation:popIn .4s ease .2s both">
        <div class="pcard">
          <img class="pcard-flag" src="${flagUrl(t1.fc)}" alt="${t1.name}"/>
          <div class="pcard-name">${t1.name}</div>
          <div class="pcard-meta">Seed ${t1.s}<br/>FIFA Rank ${t1.r}<br/>Pool 1</div>
        </div>
        <div class="pcard">
          <img class="pcard-flag" src="${flagUrl(t2.fc)}" alt="${t2.name}"/>
          <div class="pcard-name">${t2.name}</div>
          <div class="pcard-meta">Seed ${t2.s}<br/>FIFA Rank ${t2.r}<br/>Pool 2</div>
        </div>
      </div>
      <p class="good-luck">Good luck — may your teams bring home the prizes! 🏆</p>
    </div>`;
}

async function init() {
  const params = getParams();
  if (params.draw) {
    await renderMemberDraw(params.draw);
  } else if (params.admin === '1') {
    renderAdminPanel();
  } else {
    renderLockScreen();
  }
}

init();
</script>
</body>
</html>
